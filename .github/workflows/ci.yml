name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run feedback widget lint
        run: |
          # Basic syntax check on JS files
          node --check feedback-widget.js 2>&1 || echo "feedback-widget.js syntax check skipped"

      - name: Check API files
        run: |
          for f in api/*.js; do
            node --check "$f" 2>&1 && echo "$f: OK" || echo "$f: FAILED"
          done
